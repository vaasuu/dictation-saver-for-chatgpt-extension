<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>ChatGPT Voice Saver</title>
    <style>
      body {
        width: 400px;
        padding: 16px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      }
      h1 {
        font-size: 18px;
        margin: 0 0 16px 0;
        color: #333;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th, td {
        padding: 8px;
        text-align: left;
        border-bottom: 1px solid #ddd;
      }
      th {
        background-color: #f8f9fa;
        font-weight: 500;
      }
      button {
        padding: 4px 8px;
        background: none;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 16px;
      }
      button:hover {
        background-color: #f0f0f0;
      }
      .no-recordings {
        text-align: center;
        color: #666;
        padding: 20px;
      }
    </style>
  </head>
  <body>
    <h1>Recent Voice Recordings</h1>
    <div id="recordings-container">
      <table>
        <thead>
          <tr>
            <th>Start time</th>
            <th>Duration</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="recordings-list">
          <!-- Recordings will be inserted here -->
        </tbody>
      </table>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
